<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 2000" width="1600" height="2000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c1037"/>
      <stop offset="0.32" stop-color="#332154"/>
      <stop offset="0.56" stop-color="#48317f"/>
      <stop offset="0.8" stop-color="#2b1c55"/>
      <stop offset="1" stop-color="#150b2b"/>
    </linearGradient>
    <radialGradient id="topGlow" cx="0.5" cy="0.27" r="0.6">
      <stop offset="0" stop-color="#bba6ee" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#7a55c8" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#7a55c8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="goldGlow" cx="0.5" cy="0.66" r="0.55">
      <stop offset="0" stop-color="#f5b335" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#f5b335" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.72">
      <stop offset="0.58" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#0b0620" stop-opacity="0.6"/>
    </radialGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#8656dc" stop-opacity="0"/>
      <stop offset="0.32" stop-color="#9b6fe8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#f5b335" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="2000" fill="url(#base)"/>

  <!-- stage light shafts -->
  <g opacity="0.4">
    <polygon points="800,-60 1010,-60 770,940 700,940" fill="#cbb4f7" opacity="0.10"/>
    <polygon points="800,-60 690,-60 545,860 645,860" fill="#cbb4f7" opacity="0.08"/>
    <polygon points="800,-60 1210,-60 1060,860 955,860" fill="#cbb4f7" opacity="0.07"/>
  </g>

  <rect width="1600" height="2000" fill="url(#topGlow)"/>
  <rect width="1600" height="2000" fill="url(#goldGlow)"/>

  <!-- floating gold particles -->
  <g fill="#ffd978">
    <circle cx="220" cy="360" r="3" opacity="0.5"/>
    <circle cx="380" cy="240" r="2" opacity="0.4"/>
    <circle cx="560" cy="420" r="4" opacity="0.55"/>
    <circle cx="700" cy="180" r="2" opacity="0.35"/>
    <circle cx="900" cy="300" r="3" opacity="0.5"/>
    <circle cx="1080" cy="220" r="2" opacity="0.4"/>
    <circle cx="1240" cy="380" r="3" opacity="0.45"/>
    <circle cx="1360" cy="260" r="2" opacity="0.35"/>
    <circle cx="180" cy="640" r="2" opacity="0.4"/>
    <circle cx="1420" cy="640" r="3" opacity="0.45"/>
    <circle cx="320" cy="820" r="2" opacity="0.3"/>
    <circle cx="1280" cy="860" r="2" opacity="0.35"/>
    <circle cx="140" cy="1100" r="3" opacity="0.4"/>
    <circle cx="1460" cy="1080" r="2" opacity="0.3"/>
    <circle cx="500" cy="1180" r="2" opacity="0.3"/>
    <circle cx="1120" cy="1200" r="3" opacity="0.4"/>
    <circle cx="260" cy="1420" r="2" opacity="0.3"/>
    <circle cx="1340" cy="1440" r="2" opacity="0.3"/>
    <circle cx="700" cy="1320" r="2" opacity="0.25"/>
    <circle cx="960" cy="1340" r="2" opacity="0.25"/>
  </g>

  <!-- sparkle stars -->
  <g fill="#fff3cf">
    <path transform="translate(430,520) scale(1.4)" d="M0 -16 C1.2 -5 5 -1.2 16 0 C5 1.2 1.2 5 0 16 C-1.2 5 -5 1.2 -16 0 C-5 -1.2 -1.2 -5 0 -16Z" opacity="0.85"/>
    <path transform="translate(1180,440) scale(1.1)" d="M0 -16 C1.2 -5 5 -1.2 16 0 C5 1.2 1.2 5 0 16 C-1.2 5 -5 1.2 -16 0 C-5 -1.2 -1.2 -5 0 -16Z" opacity="0.7"/>
    <path transform="translate(250,980) scale(1.0)" d="M0 -16 C1.2 -5 5 -1.2 16 0 C5 1.2 1.2 5 0 16 C-1.2 5 -5 1.2 -16 0 C-5 -1.2 -1.2 -5 0 -16Z" opacity="0.6"/>
    <path transform="translate(1350,920) scale(1.2)" d="M0 -16 C1.2 -5 5 -1.2 16 0 C5 1.2 1.2 5 0 16 C-1.2 5 -5 1.2 -16 0 C-5 -1.2 -1.2 -5 0 -16Z" opacity="0.7"/>
    <path transform="translate(820,250) scale(1.7)" d="M0 -16 C1.2 -5 5 -1.2 16 0 C5 1.2 1.2 5 0 16 C-1.2 5 -5 1.2 -16 0 C-5 -1.2 -1.2 -5 0 -16Z" opacity="0.9"/>
  </g>

  <!-- voice / soundwave motif -->
  <g>
    <rect x="320" y="1694" width="18" height="46" rx="9" fill="url(#bar)"/>
    <rect x="380" y="1658" width="18" height="82" rx="9" fill="url(#bar)"/>
    <rect x="440" y="1610" width="18" height="130" rx="9" fill="url(#bar)"/>
    <rect x="500" y="1668" width="18" height="72" rx="9" fill="url(#bar)"/>
    <rect x="560" y="1564" width="18" height="176" rx="9" fill="url(#bar)"/>
    <rect x="620" y="1632" width="18" height="108" rx="9" fill="url(#bar)"/>
    <rect x="680" y="1490" width="18" height="250" rx="9" fill="url(#bar)"/>
    <rect x="740" y="1590" width="18" height="150" rx="9" fill="url(#bar)"/>
    <rect x="800" y="1410" width="18" height="330" rx="9" fill="url(#bar)"/>
    <rect x="860" y="1590" width="18" height="150" rx="9" fill="url(#bar)"/>
    <rect x="920" y="1490" width="18" height="250" rx="9" fill="url(#bar)"/>
    <rect x="980" y="1632" width="18" height="108" rx="9" fill="url(#bar)"/>
    <rect x="1040" y="1564" width="18" height="176" rx="9" fill="url(#bar)"/>
    <rect x="1100" y="1668" width="18" height="72" rx="9" fill="url(#bar)"/>
    <rect x="1160" y="1610" width="18" height="130" rx="9" fill="url(#bar)"/>
